<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JLPT Helper</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      body {
        margin: 0;
        min-width: 280px;
      }
      .jt4y-helper__popup {
        padding: 14px;
      }
      .jt4y-helper__popup h1 {
        font-size: 17px;
        margin: 0 0 8px;
      }
      .jt4y-helper__popup p {
        color: #475569;
        margin: 0 0 12px;
      }
      .jt4y-helper__popup a {
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="jt4y-helper jt4y-helper__popup">
      <h1>JLPT Helper</h1>
      <p>Works on compatible Japanesetest4you practice pages with an Answer Key section.</p>
      <button id="open-options" type="button">Options</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
